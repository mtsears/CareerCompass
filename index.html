const sel=new Set();
let lastResults=[],lastThemes=[];

function buildGrid(){
  const g=document.getElementById('grid');
  SKILLS.forEach((s,i)=>{
    const b=document.createElement('button');
    b.className='skill-chip';
    b.innerHTML=EMOJIS[i]+' '+s.label;
    b.setAttribute('role','checkbox');
    b.setAttribute('aria-checked','false');
    b.setAttribute('aria-label',s.label);
    b.onclick=()=>{
      if(sel.has(i)){sel.delete(i);b.classList.remove('sel');b.setAttribute('aria-checked','false');}
      else{sel.add(i);b.classList.add('sel');b.setAttribute('aria-checked','true');}
      document.getElementById('cnt').textContent=sel.size;
      document.getElementById('find-btn').disabled=sel.size<2;
    };
    g.appendChild(b);
  });
}

function findCareers(){
  const counts={tech:0,engineering:0,science:0,numbers:0,people:0,environment:0,creative:0};
  [...sel].forEach(i=>counts[SKILLS[i].theme]++);
  const sorted=Object.entries(counts).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  const t1=sorted[0][0];
  const t2=sorted.length>1&&sorted[1][1]>0?sorted[1][0]:t1;
  const key=[t1,t2].sort().join('+');
  lastThemes=[TNAME[t1],t1===t2?null:TNAME[t2]].filter(Boolean);
  lastResults=DB[key]||DB[[t2,t1].sort().join('+')]||[];
  if(!lastResults.length){
    const fallback=Object.keys(DB).find(k=>k.includes(t1));
    lastResults=fallback?DB[fallback]:[];
  }
  renderResults(lastResults,t1===t2);
}

const ACCENTS=['#00A896','#FF6B35','#7B2D8B'];

function renderResults(careers,singleTheme){
  document.getElementById('theme-line').textContent=singleTheme
    ?'Your strengths are in: '+lastThemes[0]
    :'Your top themes: '+lastThemes.join(' + ');
  const c=document.getElementById('cards');
  c.innerHTML='';
  careers.forEach((career,i)=>{
    const cxc=(career.cxc_subjects||[]).map(s=>`<span class="tag cxc">${s}</span>`).join('');
    const uni=(career.universities||[]).map(u=>`<span class="tag uni">${u}</span>`).join('');
    const div=document.createElement('div');
    div.className='career-card';
    div.setAttribute('role','article');
    div.setAttribute('aria-label',career.title+' career card');
    div.innerHTML=`
      <div class="card-accent" style="background:${ACCENTS[i]}"></div>
      <div class="card-header">
        <div class="card-icon" aria-hidden="true">${career.icon}</div>
        <div><div class="card-title">${career.title}</div><div class="card-tagline">${career.tagline}</div></div>
        <div class="match-badge" aria-label="${career.match}">⭐ ${career.match}</div>
      </div>
      <div class="card-body">
        <div class="why-match" role="note">🔍 ${career.why_match}</div>
        <div class="blurb">${career.blurb}</div>
        <div class="info-grid">
          <div class="info-box hl"><div class="lbl">💰 Salary (global)</div><div class="val">${career.salary_range}</div></div>
          <div class="info-box"><div class="lbl">🌍 Workers worldwide</div><div class="val">${career.global_workers}</div></div>
          <div class="info-box full"><div class="lbl">🌴 In CARICOM</div><div class="val">${career.caricom_note}</div></div>
        </div>
        <div class="info-box" style="margin-bottom:.6rem"><div class="lbl">📚 CXC subjects</div><div class="tags-row" role="list">${cxc}</div></div>
        <div class="info-box"><div class="lbl">🏫 Regional universities</div><div class="tags-row" role="list">${uni}</div></div>
      </div>`;
    c.appendChild(div);
  });
  document.getElementById('picker').style.display='none';
  document.getElementById('results').style.display='block';
}

function goBack(){
  document.getElementById('results').style.display='none';
  document.getElementById('picker').style.display='block';
  document.getElementById('share-toast').textContent='';
}

function shareResults(){
  if(!lastResults.length) return;
  const lines=lastResults.map((r,i)=>`${i+1}. ${r.title}\n   ${r.why_match}\n   Salary: ${r.salary_range}`);
  const text=`My Caribbean Career Compass Results 🌴\n\nThemes: ${lastThemes.join(' + ')}\n\n${lines.join('\n\n')}\n\nCaribbean Career Compass — STEAM Edition 🧭`;
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(()=>showToast('✓ Copied to clipboard!')).catch(()=>showToast('Could not copy — try manually.'));
  } else showToast('Clipboard not available in this browser.');
}

function showToast(msg){
  const t=document.getElementById('share-toast');
  t.textContent=msg;
  setTimeout(()=>{t.textContent='';},3500);
}

buildGrid();
